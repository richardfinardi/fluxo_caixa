<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Engine V3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <!-- Tailwind CSS para um visual limpo e responsivo -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        /* Ajuste fino para tabelas roláveis no celular */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-800 pb-12">

    <!-- Cabeçalho Fixo -->
    <header class="bg-[#2c3e50] text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">💰 Finanças Engine V3</h1>
        <span id="status" class="bg-green-500 text-xs px-2 py-1 rounded-full text-white font-medium">Conectado</span>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- Dashboard de Cards (Corrigido texto sumido) -->
        <div class="grid grid-cols-3 gap-2 text-center text-xs font-bold">
            <div class="bg-gray-700 text-white p-3 rounded-xl shadow-sm flex flex-col justify-between min-h-[85px]">
                <span class="opacity-90 block mb-1">SALDO HOJE</span>
                <span id="saldo-hoje" class="text-sm md:text-base break-words">R$ 0,00</span>
            </div>
            <div class="bg-blue-600 text-white p-3 rounded-xl shadow-sm flex flex-col justify-between min-h-[85px]">
                <span class="opacity-90 block mb-1">RECEITAS HOJE</span>
                <span id="receitas-hoje" class="text-sm md:text-base break-words">R$ 0,00</span>
            </div>
            <div class="bg-red-600 text-white p-3 rounded-xl shadow-sm flex flex-col justify-between min-h-[85px]">
                <span class="opacity-90 block mb-1">SAÍDAS HOJE</span>
                <span id="saidas-hoje" class="text-sm md:text-base break-words">R$ 0,00</span>
            </div>
        </div>

        <!-- Área Central (Para simulações ou novos lançamentos futuras) -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hidden" id="area-simulacao">
            <!-- Seu botão de Efetivar ou controles entram aqui se precisar -->
        </div>

        <!-- Fluxo de Caixa Diário -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
            <h3 class="font-bold text-lg text-gray-700 border-b border-gray-100 pb-2">Fluxo de Caixa Diário</h3>
            
            <div class="table-container rounded-xl border border-gray-100">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-gray-800 text-white text-xs uppercase tracking-wider">
                            <th class="p-3">Data</th>
                            <th class="p-3">Receitas</th>
                            <th class="p-3">Saídas</th>
                            <th class="p-3">Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-fluxo" class="divide-y divide-gray-100">
                        <!-- Preenchido via JS -->
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-400">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // Registrar o Service Worker para funcionar como App (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("Erro SW:", err));
        }

        // URL da sua API do Google Apps Script (Cole a sua URL de Execução aqui se necessário)
        const API_URL = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI"; 

        // Função utilitária para formatar números brutos em Moeda Real (R$ 1.234,56)
        function formatarMoeda(valor) {
            const numero = parseFloat(valor) || 0;
            return numero.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        // Função para buscar dados da API da planilha
        async function carregarDados() {
            try {
                document.getElementById('status').innerText = "Atualizando...";
                document.getElementById('status').className = "bg-yellow-500 text-xs px-2 py-1 rounded-full text-white font-medium";

                const response = await fetch(API_URL);
                const data = await response.json();

                // 1. Atualizar os Cards do Topo com formatação bonita
                document.getElementById('saldo-hoje').innerText = formatarMoeda(data.saldoHoje);
                document.getElementById('receitas-hoje').innerText = formatarMoeda(data.receitasHoje);
                document.getElementById('saidas-hoje').innerText = formatarMoeda(data.saidasHoje);

                // 2. Montar a tabela de fluxo de caixa corrigindo dízimas periódicas
                const tbody = document.getElementById('tabela-fluxo');
                tbody.innerHTML = "";

                if (data.fluxoDiario && data.fluxoDiario.length > 0) {
                    data.fluxoDiario.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-gray-55/50 transition-colors";
                        tr.innerHTML = `
                            <td class="p-3 font-medium text-gray-600">${item.data}</td>
                            <td class="p-3 text-green-600">${formatarMoeda(item.receitas)}</td>
                            <td class="p-3 text-red-600">${formatarMoeda(item.saidas)}</td>
                            <td class="p-3 font-semibold ${item.saldo >= 0 ? 'text-blue-600' : 'text-amber-600'}">${formatarMoeda(item.saldo)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">Nenhum dado encontrado.</td></tr>`;
                }

                document.getElementById('status').innerText = "Conectado";
                document.getElementById('status').className = "bg-green-500 text-xs px-2 py-1 rounded-full text-white font-medium";

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                document.getElementById('status').innerText = "Erro de Conexão";
                document.getElementById('status').className = "bg-red-500 text-xs px-2 py-1 rounded-full text-white font-medium";
            }
        }

        // Executa ao abrir a página
        window.onload = () => {
            // Se você ainda não colou a URL real do Apps Script, vamos puxar dados fictícios apenas para testar o layout
            if(API_URL.includes("SUA_URL_DO_GOOGLE")){
                mockTest();
            } else {
                carregarDados();
            }
        };

        // Função apenas para você ver o layout lindo antes mesmo de colar sua URL do Apps Script se quiser
        function mockTest() {
            document.getElementById('saldo-hoje').innerText = formatarMoeda(-75800.03);
            document.getElementById('receitas-hoje').innerText = formatarMoeda(3500);
            document.getElementById('saidas-hoje').innerText = formatarMoeda(450.50);
            
            const tbody = document.getElementById('tabela-fluxo');
            tbody.innerHTML = `
                <tr class="border-b border-gray-100"><td class="p-3 text-gray-600">16/07</td><td class="p-3 text-green-600">${formatarMoeda(338.72)}</td><td class="p-3 text-red-600">${formatarMoeda(0)}</td><td class="p-3 font-semibold text-blue-600">${formatarMoeda(338.72)}</td></tr>
                <tr class="border-b border-gray-100"><td class="p-3 text-gray-600">17/07</td><td class="p-3 text-green-600">${formatarMoeda(0)}</td><td class="p-3 text-red-600">${formatarMoeda(63.42)}</td><td class="p-3 font-semibold text-blue-600">${formatarMoeda(275.30)}</td></tr>
                <tr class="border-b border-gray-100"><td class="p-3 text-gray-600">18/07</td><td class="p-3 text-green-600">${formatarMoeda(0)}</td><td class="p-3 text-red-600">${formatarMoeda(167.709999999998)}</td><td class="p-3 font-semibold text-blue-600">${formatarMoeda(107.59)}</td></tr>
            `;
        }
    </script>
</body>
</html>
